server {
    listen 80;
    server_name localhost;
    server_tokens off;
    resolver 127.0.0.11 ipv6=off valid=30s;
    client_max_body_size 4m;

    location = /33zzadmin {
        return 301 /33zzadmin/;
    }

    location /33zzadmin/ {
        set $admin_upstream admin;
        proxy_pass http://$admin_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /api/ {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:3001/health;
        proxy_http_version 1.1;
    }

    location /health/db {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:3001/health/db;
        proxy_http_version 1.1;
    }

    location / {
        set $landing_upstream landing;
        proxy_pass http://$landing_upstream:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
