services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pumpcast}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-pumpcast}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pumpcast-network

  backend:
    image: ${BACKEND_IMAGE:-pumpcast-backend}
    restart: unless-stopped
    pull_policy: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-adminpassword}@postgres:5432/${POSTGRES_DB:-pumpcast}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
      ADMIN_WALLET: ${ADMIN_WALLET:-0xd21760a4ad624d15ee37570b3c09fd3bff489309}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health/db >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pumpcast-network

  landing:
    image: ${LANDING_IMAGE:-pumpcast-landing}
    restart: unless-stopped
    pull_policy: always
    networks:
      - pumpcast-network

  admin:
    image: ${ADMIN_IMAGE:-pumpcast-admin}
    restart: unless-stopped
    pull_policy: always
    networks:
      - pumpcast-network

  proxy:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      landing:
        condition: service_started
      admin:
        condition: service_started
    networks:
      - pumpcast-network

networks:
  pumpcast-network:
    driver: bridge

volumes:
  postgres_data:
