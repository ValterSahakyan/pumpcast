version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: pumpcast
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://admin:adminpassword@postgres:5432/pumpcast
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  postgres_data:
