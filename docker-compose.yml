version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminpassword}
      POSTGRES_DB: ${POSTGRES_DB:-pumpcast}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ${BACKEND_IMAGE:-pumpcast-backend}
    build: .
    restart: always
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-adminpassword}@postgres:5432/${POSTGRES_DB:-pumpcast}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
    networks:
      - pumpcast-network

  landing:
    image: ${LANDING_IMAGE:-pumpcast-landing}
    build: ./landing-react
    restart: always
    networks:
      - pumpcast-network

  admin:
    image: ${ADMIN_IMAGE:-pumpcast-admin}
    build: ./admin-react
    restart: always
    networks:
      - pumpcast-network

  proxy:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - landing
      - admin
    networks:
      - pumpcast-network

networks:
  pumpcast-network:
    driver: bridge

volumes:
  postgres_data:

