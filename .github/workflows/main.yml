name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Build and Package the Extension
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Package Extension
        run: |
          cd extension
          zip -r ../pumpcast-extension.zip .
          
      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pumpcast-extension
          path: pumpcast-extension.zip

  # Job 2: Build and Push Landing Page Docker Image
  build-landing-page:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./landing-react
          push: false
          tags: pumpcast-landing:latest
          
      # If you have Docker Hub or GHCR credentials, you can add login and push steps here
