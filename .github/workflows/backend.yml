name: Production CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/backend.yml"
      - "Dockerfile"
      - "docker-compose.yml"
      - "nginx.conf"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "package-lock.json"
      - "server.js"
      - "services/**"
      - "store/**"
      - "landing-react/**"
      - "admin-react/**"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            landing-react/package-lock.json
            admin-react/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Validate backend sources
        run: npm run check

      - name: Install landing dependencies
        working-directory: landing-react
        run: npm ci

      - name: Build landing app
        working-directory: landing-react
        run: npm run build

      - name: Install admin dependencies
        working-directory: admin-react
        run: npm ci

      - name: Build admin app
        working-directory: admin-react
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.tags.outputs.backend_tag }}
      landing_tag: ${{ steps.tags.outputs.landing_tag }}
      admin_tag: ${{ steps.tags.outputs.admin_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          BACKEND_IMAGE="${REGISTRY}/${REPO_LC}-backend"
          LANDING_IMAGE="${REGISTRY}/${REPO_LC}-landing"
          ADMIN_IMAGE="${REGISTRY}/${REPO_LC}-admin"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "landing_image=${LANDING_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "admin_image=${ADMIN_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "backend_tag=${BACKEND_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "landing_tag=${LANDING_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "admin_tag=${ADMIN_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.backend_tag }}
            ${{ steps.tags.outputs.backend_image }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: ./landing-react
          file: ./landing-react/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.landing_tag }}
            ${{ steps.tags.outputs.landing_image }}:latest
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

      - name: Build and push admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin-react
          file: ./admin-react/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.admin_tag }}
            ${{ steps.tags.outputs.admin_image }}:latest
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    env:
      SSH_HOST: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_HOST || secrets.SERVER_HOST }}
      SSH_USER: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || secrets.SERVER_USER }}
      SSH_KEY: ${{ secrets.DEPLOY_KEY != '' && secrets.DEPLOY_KEY || secrets.SSH_PRIVATE_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "${SSH_HOST}" || (echo "Missing DEPLOY_HOST or SERVER_HOST secret." && exit 1)
          test -n "${SSH_USER}" || (echo "Missing DEPLOY_USER or SERVER_USER secret." && exit 1)
          test -n "${SSH_KEY}" || (echo "Missing DEPLOY_KEY or SSH_PRIVATE_KEY secret." && exit 1)
          test -n "${GHCR_USERNAME}" || (echo "Missing GHCR_USERNAME secret." && exit 1)
          test -n "${GHCR_TOKEN}" || (echo "Missing GHCR_TOKEN secret." && exit 1)

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          source: "docker-compose.yml,nginx.conf,.env.example"
          target: "~/pumpcast"

      - name: Deploy containers on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script_stop: true
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            mkdir -p "$HOME/pumpcast"
            cd "$HOME/pumpcast"

            if [ ! -f .env ]; then
              cp .env.example .env
              echo "Created .env from .env.example. Update production secrets before relying on the service."
            fi

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            export BACKEND_IMAGE='${{ needs.build-and-push.outputs.backend_tag }}'
            export LANDING_IMAGE='${{ needs.build-and-push.outputs.landing_tag }}'
            export ADMIN_IMAGE='${{ needs.build-and-push.outputs.admin_tag }}'

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
