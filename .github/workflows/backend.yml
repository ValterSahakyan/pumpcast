name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/**'
      - 'store/**'
      - 'landing-react/**'
      - 'package-lock.json'
      - 'landing-react/package-lock.json'
      - 'server.js'
      - 'package.json'
      - 'Dockerfile'
      - '.github/workflows/backend.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            landing-react/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Install landing page dependencies
        working-directory: landing-react
        run: npm install

      - name: Build landing page
        working-directory: landing-react
        run: npm run build

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      SSH_HOST: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_HOST || secrets.SERVER_HOST }}
      SSH_USER: ${{ secrets.DEPLOY_USER != '' && secrets.DEPLOY_USER || secrets.SERVER_USER }}
      SSH_KEY: ${{ secrets.DEPLOY_KEY != '' && secrets.DEPLOY_KEY || secrets.SSH_PRIVATE_KEY }}
    steps:
      - name: Validate deploy secrets
        run: |
          if [ -z "${SSH_HOST}" ]; then
            echo "Missing SSH host. Set DEPLOY_HOST or SERVER_HOST in GitHub Actions secrets."
            exit 1
          fi
          if [ -z "${SSH_USER}" ]; then
            echo "Missing SSH username. Set DEPLOY_USER or SERVER_USER in GitHub Actions secrets."
            exit 1
          fi
          if [ -z "${SSH_KEY}" ]; then
            echo "Missing SSH private key. Set DEPLOY_KEY or SSH_PRIVATE_KEY in GitHub Actions secrets."
            exit 1
          fi

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_KEY }}
          script: |
            set -e
            APP_PORT=3011

            if [ -d "$HOME/pumpcast" ]; then
              cd "$HOME/pumpcast"
            elif [ -d "/var/www/pumpcast" ]; then
              cd "/var/www/pumpcast"
            else
              echo "Deploy directory not found. Expected $HOME/pumpcast or /var/www/pumpcast."
              exit 1
            fi

            if [ -d ".git" ]; then
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
            else
              echo "Deploy directory is not a git checkout."
              exit 1
            fi

            # Remove stale Docker containers already publishing the app port.
            RUNNING_ON_PORT="$(docker ps -q --filter "publish=${APP_PORT}")"
            if [ -n "$RUNNING_ON_PORT" ]; then
              echo "Stopping Docker containers using port ${APP_PORT}: $RUNNING_ON_PORT"
              docker stop $RUNNING_ON_PORT
              docker rm $RUNNING_ON_PORT
            fi

            if command -v lsof >/dev/null 2>&1; then
              REMAINING_PIDS="$(lsof -ti tcp:${APP_PORT} || true)"
              if [ -n "$REMAINING_PIDS" ]; then
                echo "Port ${APP_PORT} is still occupied by host process(es): $REMAINING_PIDS"
                exit 1
              fi
            fi

            # Shut down any previous compose stack before recreating it.
            if docker compose version >/dev/null 2>&1; then
              docker compose down --remove-orphans || true
              docker compose pull
              docker compose up -d --build
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose down --remove-orphans || true
              docker-compose pull
              docker-compose up -d --build
            else
              echo "Neither 'docker compose' nor 'docker-compose' is installed on the server."
              exit 1
            fi
