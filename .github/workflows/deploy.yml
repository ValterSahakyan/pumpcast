name: Production Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image names
  BACKEND_IMAGE: ${{ github.repository }}-backend
  LANDING_IMAGE: ${{ github.repository }}-landing
  ADMIN_IMAGE: ${{ github.repository }}-admin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Landing Page
      - name: Build and push Landing
        uses: docker/build-push-action@v5
        with:
          context: ./landing-react
          file: ./landing-react/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LANDING_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Admin Panel
      - name: Build and push Admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin-react
          file: ./admin-react/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx.conf,.env.example"
          target: "~/pumpcast"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/pumpcast
            
            # Create .env if it doesn't exist
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "Created .env from .env.example. PLEASE UPDATE SECRETS!"
            fi
            
            # Export image names for docker-compose
            export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            export LANDING_IMAGE=${{ env.REGISTRY }}/${{ env.LANDING_IMAGE }}:latest
            export ADMIN_IMAGE=${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}:latest
            
            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull and Restart
            docker compose pull
            docker compose up -d --remove-orphans
            
            # Cleanup old images
            docker image prune -f
